name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-test:
    name: ${{ matrix.os }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  compiler: gcc }
          - { os: ubuntu-latest,  compiler: clang }
          - { os: macos-latest,   compiler: clang }
          - { os: windows-latest, compiler: msvc }
    steps:
      - uses: actions/checkout@v4

      - name: Set compiler (Unix)
        if: runner.os != 'Windows'
        run: |
          if [ "${{ matrix.compiler }}" = "clang" ]; then
            echo "CC=clang"   >> "$GITHUB_ENV"
            echo "CXX=clang++" >> "$GITHUB_ENV"
          else
            echo "CC=gcc" >> "$GITHUB_ENV"
            echo "CXX=g++" >> "$GITHUB_ENV"
          fi

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCORVUS_BUILD_EXAMPLES=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure

  sanitizers:
    name: ubuntu / asan+ubsan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: >
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure
